<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klyna AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .ai-msg { background: #1e293b; border-radius: 2px 18px 18px 18px; }
        .user-msg { background: #2563eb; border-radius: 18px 18px 2px 18px; }
        .clickable-link { color: #60a5fa; text-decoration: underline; font-weight: bold; }
        .dot { animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 h-screen overflow-hidden flex flex-col">

    <div id="auth-page" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="w-full max-w-md p-8 bg-slate-900 rounded-3xl border border-blue-500/20 shadow-2xl">
            <h1 class="text-4xl font-black text-blue-500 text-center mb-8">KLYNA AI</h1>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Username" class="w-full p-4 bg-slate-800 rounded-xl outline-none focus:ring-2 ring-blue-500">
                <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-slate-800 rounded-xl outline-none focus:ring-2 ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500 transition">Masuk</button>
            </div>
        </div>
    </div>

    <main class="flex flex-1 overflow-hidden">
        <div class="flex-1 flex flex-col bg-slate-950 border-r border-slate-800">
            <header class="p-4 border-b border-slate-800 flex justify-between items-center">
                <span class="font-black text-blue-500 tracking-tighter text-xl">KLYNA AI</span>
                <div id="badge" class="text-[10px] bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">FREE</div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6">
                </div>

            <div class="p-4 bg-slate-950">
                <div class="max-w-3xl mx-auto relative">
                    <input id="chat-input" type="text" placeholder="Tanya sesuatu atau kirim kode HTML..." class="w-full p-4 pr-16 bg-slate-900 rounded-2xl border border-slate-800 focus:border-blue-500 outline-none">
                    <button onclick="sendMessage()" class="absolute right-2 top-2 bottom-2 px-4 bg-blue-600 rounded-xl hover:bg-blue-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    </button>
                </div>
                <p id="premium-hint" class="text-center text-[10px] text-slate-500 mt-2 cursor-pointer hover:text-blue-400" onclick="buyPremium()">Upgrade Premium Rp500 seumur hidup?</p>
            </div>
        </div>

        <div id="canvas-area" class="hidden md:flex flex-col w-[400px] bg-slate-900 border-l border-slate-800">
            <div class="p-4 bg-slate-800 font-bold text-xs flex justify-between items-center">
                <span>HTML LIVE PREVIEW</span>
                <button onclick="closeCanvas()" class="text-red-400">Tutup</button>
            </div>
            <iframe id="preview-frame" class="flex-1 bg-white w-full border-none"></iframe>
        </div>
    </main>

    <div id="pay-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-[110]">
        <div class="bg-white p-6 rounded-3xl text-center w-full max-w-xs shadow-2xl text-slate-900">
            <h3 class="font-bold mb-2">Upgrade Premium</h3>
            <img id="qris-img" class="w-full mb-4 border rounded-xl" src="">
            <p class="text-[10px] animate-pulse text-blue-600 font-bold">MENUNGGU PEMBAYARAN RP500...</p>
            <button onclick="closeModal()" class="mt-4 text-xs font-bold text-red-500">BATAL</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('klyna_user');
        if(currentUser) document.getElementById('auth-page').classList.add('hidden');

        // Regex Link Detector
        function formatText(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="clickable-link">${url}</a>`);
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('klyna_user', u);
                localStorage.setItem('is_premium', data.user.isPremium);
                location.reload();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const val = input.value;
            if(!val) return;

            appendMsg('User', val);
            input.value = '';

            const tid = appendTyping();
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: localStorage.getItem('klyna_user'), text: val})
            });
            const data = await res.json();
            removeTyping(tid);

            // Cek jika ada kode HTML
            if(data.result.includes('<!DOCTYPE') || data.result.includes('<html') || data.result.includes('<div')) {
                showCanvas(data.result);
            }

            appendMsg('AI', data.result);
        }

        function appendMsg(sender, text) {
            const box = document.getElementById('chat-box');
            const isUser = sender === 'User';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${isUser ? 'user-msg' : 'ai-msg'} p-4 text-sm max-w-[85%] shadow-lg border border-slate-800/50">
                ${formatText(text)}
            </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function showCanvas(htmlCode) {
            document.getElementById('canvas-area').classList.remove('hidden');
            const frame = document.getElementById('preview-frame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(htmlCode);
            doc.close();
        }

        function closeCanvas() { document.getElementById('canvas-area').classList.add('hidden'); }

        async function buyPremium() {
            const res = await fetch('/api/pay-create');
            const data = await res.json();
            document.getElementById('qris-img').src = `https://api.qrserver.com/v1/create-qr-code/?data=${data.qr}`;
            document.getElementById('pay-modal').classList.replace('hidden', 'flex');
            
            const itv = setInterval(async () => {
                const c = await fetch('/api/pay-check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: localStorage.getItem('klyna_user'), trxId: data.trxId})
                });
                const r = await c.json();
                if(r.success) {
                    clearInterval(itv);
                    alert("Sukses Premium!");
                    localStorage.setItem('is_premium', 'true');
                    location.reload();
                }
            }, 5000);
        }

        function appendTyping() {
            const id = 't-' + Date.now();
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div id="${id}" class="flex justify-start"><div class="ai-msg p-4 flex gap-1"><span class="dot w-1.5 h-1.5 bg-blue-500 rounded-full"></span><span class="dot w-1.5 h-1.5 bg-blue-500 rounded-full"></span><span class="dot w-1.5 h-1.5 bg-blue-500 rounded-full"></span></div></div>`;
            return id;
        }
        function removeTyping(id) { document.getElementById(id)?.remove(); }
        function closeModal() { location.reload(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
