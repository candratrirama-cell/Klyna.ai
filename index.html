<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klyna AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; scroll-behavior: smooth; }
        .user-bubble { background: #2563eb; border-radius: 20px 20px 4px 20px; align-self: flex-end; }
        .ai-bubble { background: #1e293b; border-radius: 4px 20px 20px 20px; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        pre { background: #0f172a; padding: 16px; border-radius: 12px; overflow-x: auto; font-family: monospace; font-size: 13px; margin-top: 10px; border: 1px solid #334155; position: relative; }
        .typing-dot { width: 5px; height: 5px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="landing-page" class="fixed inset-0 z-50 bg-[#020617] flex flex-col overflow-y-auto">
        <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
            <div class="text-2xl font-black text-blue-500">KLYNA AI</div>
            <button onclick="showAuth()" class="bg-blue-600 px-6 py-2 rounded-full font-bold text-sm">Masuk</button>
        </nav>
        <div class="flex-1 flex flex-col items-center justify-center text-center px-6 pb-20">
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter">AI Pintar Untuk <br><span class="text-blue-500">Masa Depanmu.</span></h1>
            <p class="text-slate-400 max-w-lg mb-10">Asisten cerdas yang siap membantu tugas, coding, dan pencarian informasi secepat kilat.</p>
            <div class="flex gap-4">
                <button onclick="showAuth()" class="bg-blue-600 px-8 py-4 rounded-2xl font-bold shadow-xl shadow-blue-600/20">Mulai Sekarang</button>
                <a href="https://rm-two.vercel.app" target="_blank" class="bg-slate-900 border border-slate-800 px-8 py-4 rounded-2xl font-bold">Donasi Dev</a>
            </div>
        </div>
    </div>

    <div id="auth-page" class="hidden fixed inset-0 z-[60] bg-slate-950 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-slate-900 p-10 rounded-[2.5rem] border border-white/5 text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-8">KLYNA AI</h2>
            <input id="username" type="text" placeholder="Username" class="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none focus:ring-1 ring-blue-500">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-slate-800 rounded-2xl outline-none focus:ring-1 ring-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold hover:bg-blue-500 transition-all">Sign In</button>
            <button onclick="location.reload()" class="mt-6 text-xs text-slate-500 block w-full uppercase tracking-widest font-bold">Kembali</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-1 flex flex-col bg-[#020617]">
        <header class="p-4 border-b border-white/5 flex justify-between items-center bg-slate-950/50 backdrop-blur-md">
            <div id="badge" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-400 uppercase tracking-widest">Memuat...</div>
            <div class="flex gap-4 items-center">
                <a href="https://rm-two.vercel.app" target="_blank" class="text-[10px] font-bold text-blue-400 hover:text-white transition">DONASI ❤️</a>
                <button onclick="logout()" class="text-xs text-slate-500 font-bold">LOGOUT</button>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col">
            <div id="chat-inner" class="max-w-2xl mx-auto w-full space-y-6 pt-4 flex flex-col"></div>
        </div>

        <div class="p-4 max-w-2xl mx-auto w-full pb-8">
            <div class="flex gap-2 items-center bg-slate-900 p-2 rounded-3xl border border-slate-800 shadow-2xl">
                <input id="chat-input" type="text" placeholder="Tanyakan sesuatu..." class="flex-1 bg-transparent p-4 outline-none text-sm ml-2 text-white" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="bg-blue-600 p-4 rounded-2xl hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </div>
            <p id="upgrade-btn" class="text-center text-[10px] mt-4 text-blue-500/50 cursor-pointer font-bold uppercase tracking-widest" onclick="buyPremium()">✨ Get Premium Lifetime Rp500 ✨</p>
        </div>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[3rem] text-center max-w-xs w-full text-slate-900">
            <h3 class="font-black text-xl mb-2">Go Premium</h3>
            <p class="text-slate-400 text-[10px] mb-6">Scan QRIS untuk akses selamanya</p>
            <img id="qris-img" class="w-full rounded-3xl border-4 border-slate-50 mb-6" src="">
            <div class="text-[10px] text-blue-600 font-bold animate-pulse tracking-widest">MENUNGGU PEMBAYARAN...</div>
            <button onclick="location.reload()" class="mt-8 text-xs text-slate-400 font-bold uppercase tracking-widest">Batal</button>
        </div>
    </div>

    <script>
        let checkPay;

        window.onload = () => { if(localStorage.getItem('klyna_user')) showDashboard(); };

        function showAuth() { document.getElementById('landing-page').classList.add('hidden'); document.getElementById('auth-page').classList.remove('hidden'); }
        function showDashboard() { 
            document.getElementById('landing-page').classList.add('hidden'); 
            document.getElementById('auth-page').classList.add('hidden'); 
            document.getElementById('dashboard').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            const isPrem = localStorage.getItem('is_premium') === 'true';
            const b = document.getElementById('badge');
            b.innerText = isPrem ? "👑 PREMIUM" : "⚡ FREE USER";
            b.className = isPrem ? "text-[10px] font-bold px-3 py-1 rounded-full bg-blue-600 text-white shadow-lg shadow-blue-600/30" : "text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-400";
            if(isPrem) document.getElementById('upgrade-btn').classList.add('hidden');
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('klyna_user', u);
                localStorage.setItem('is_premium', data.user.isPremium);
                showDashboard();
            } else alert(data.msg);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value;
            if(!text) return;
            appendMsg('User', text);
            input.value = '';
            const tid = appendTyping();
            const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: localStorage.getItem('klyna_user'), text}) });
            const data = await res.json();
            removeTyping(tid);
            if(data.isPremium !== undefined) { localStorage.setItem('is_premium', data.isPremium); updateUI(); }
            appendMsg('AI', data.result);
        }

        function appendMsg(sender, text) {
            const inner = document.getElementById('chat-inner');
            const isUser = sender === 'User';
            const div = document.createElement('div');
            div.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'} max-w-full`;
            
            // Format Link Otomatis
            let formatted = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-blue-400 underline font-bold">$1</a>');
            
            // Format Kode & Tombol Salin
            if (formatted.includes('```')) {
                formatted = formatted.replace(/```([\s\S]*?)```/g, (match, code) => {
                    const cleanCode = code.replace(/&lt;/g, '<').replace(/&gt;/g, '>').trim();
                    return `
                        <div class="relative w-full">
                            <pre><code>${code}</code></pre>
                            <button onclick="copyText(this, \`${cleanCode.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="absolute top-2 right-2 bg-blue-600/80 text-[9px] font-bold px-3 py-1 rounded-md text-white hover:bg-blue-500 transition">SALIN</button>
                        </div>
                    `;
                });
            }

            div.innerHTML = `<div class="${isUser ? 'user-bubble text-white' : 'ai-bubble text-slate-200'} p-4 px-5 text-[14px] leading-relaxed max-w-[90%] shadow-xl">${formatted}</div>`;
            inner.appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function copyText(btn, code) {
            navigator.clipboard.writeText(code);
            const original = btn.innerText;
            btn.innerText = "TERSALIN!";
            setTimeout(() => btn.innerText = original, 2000);
        }

        async function buyPremium() {
            const res = await fetch('/api/pay-create');
            const data = await res.json();
            document.getElementById('qris-img').src = `https://api.qrserver.com/v1/create-qr-code/?data=${data.qr}`;
            document.getElementById('pay-modal').classList.replace('hidden', 'flex');
            checkPay = setInterval(async () => {
                const c = await fetch('/api/pay-check', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: localStorage.getItem('klyna_user'), trxId: data.trxId}) });
                const r = await c.json();
                if(r.success) { clearInterval(checkPay); localStorage.setItem('is_premium', 'true'); updateUI(); document.getElementById('pay-modal').classList.add('hidden'); alert("👑 Premium Aktif Selamanya!"); }
            }, 5000);
        }

        function appendTyping() {
            const id = 't-' + Date.now();
            document.getElementById('chat-inner').innerHTML += `<div id="${id}" class="flex justify-start"><div class="ai-bubble p-4 px-6 flex gap-1.5"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay: 0.2s"></div><div class="typing-dot" style="animation-delay: 0.4s"></div></div></div>`;
            return id;
        }
        function removeTyping(id) { document.getElementById(id)?.remove(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
