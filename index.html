<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klyna AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div id="auth-page" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-4xl font-bold mb-6 text-blue-500">Klyna AI</h1>
        <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
            <input id="username" type="text" placeholder="Username" class="w-full p-3 mb-4 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            <input id="password" type="password" placeholder="Password" class="w-full p-3 mb-6 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">Masuk / Daftar</button>
        </div>
    </div>

    <div id="chat-page" class="hidden flex flex-col h-screen">
        <header class="p-4 bg-gray-800 flex justify-between items-center shadow-md">
            <div>
                <span class="font-bold text-xl text-blue-400">Klyna AI</span>
                <span id="user-badge" class="ml-2 text-xs bg-gray-600 px-2 py-1 rounded">Free</span>
            </div>
            <button onclick="logout()" class="text-red-400 text-sm">Logout</button>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>

        <div id="premium-banner" class="hidden p-3 bg-yellow-600 text-center text-sm font-bold cursor-pointer" onclick="buyPremium()">
            Upgrade Premium Seumur Hidup (Rp500) - Klik di sini!
        </div>

        <div class="p-4 bg-gray-800 flex gap-2">
            <input id="chat-input" type="text" placeholder="Tanya sesuatu..." class="flex-1 p-3 bg-gray-700 rounded-lg outline-none">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">Kirim</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('klyna_user');
        if(currentUser) showChat();

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('klyna_user', user);
                currentUser = user;
                showChat();
            } else {
                alert(data.msg);
            }
        }

        function showChat() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');
            checkPremiumStatus();
        }

        function logout() {
            localStorage.removeItem('klyna_user');
            location.reload();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value;
            if(!text) return;
            
            appendMessage('You', text);
            input.value = '';

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: currentUser, text: text})
            });
            const data = await res.json();
            appendMessage('Klyna', data.result || data.error);
        }

        function appendMessage(sender, text) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="p-3 rounded-lg ${sender === 'You' ? 'bg-blue-900 ml-auto' : 'bg-gray-700'} max-w-[80%] w-fit">
                <b class="block text-xs opacity-50">${sender}</b> ${text}
            </div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function buyPremium() {
            const res = await fetch('/api/pay-create');
            const data = await res.json();
            if(data.success) {
                const win = window.open('', '_blank');
                win.document.write(`<h3>Scan QRIS Rp500</h3><img src="https://api.qrserver.com/v1/create-qr-code/?data=${data.qr}"><p>Jangan tutup halaman ini sampai pembayaran terdeteksi.</p>`);
                
                const interval = setInterval(async () => {
                    const check = await fetch('/api/pay-check', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: currentUser, trxId: data.trxId})
                    });
                    const resCheck = await check.json();
                    if(resCheck.success) {
                        alert("Pembayaran Berhasil! Anda sekarang Premium.");
                        clearInterval(interval);
                        win.close();
                        location.reload();
                    }
                }, 5000);
            }
        }

        function checkPremiumStatus() {
            // Logika sederhana: Jika user login, backend akan handle limitnya. 
            // Banner upgrade tampil jika status user di backend isPremium = false.
            document.getElementById('premium-banner').classList.remove('hidden');
        }
    </script>
</body>
</html>
