<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klyna AI - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; scroll-behavior: smooth; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .user-bubble { background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 20px 20px 4px 20px; }
        .ai-bubble { background: #1e293b; border-radius: 4px 20px 20px 20px; border: 1px solid rgba(255,255,255,0.05); }
        .typing-dot { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        .canvas-slide { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="landing-section" class="fixed inset-0 z-[120] bg-[#020617] overflow-y-auto">
        <nav class="flex justify-between p-6 max-w-6xl mx-auto items-center">
            <div class="text-2xl font-black text-blue-500">KLYNA.</div>
            <button onclick="goToAuth()" class="bg-blue-600 px-6 py-2 rounded-full font-bold text-sm">Masuk</button>
        </nav>
        <div class="max-w-4xl mx-auto text-center pt-24 px-6">
            <h1 class="text-6xl font-black mb-6 leading-tight">Masa Depan AI <br><span class="text-blue-500">Dalam Genggaman.</span></h1>
            <p class="text-slate-400 mb-10 text-lg">Asisten cerdas dengan fitur Live Canvas Preview. Coding lebih cepat, hasil nyata.</p>
            <button onclick="goToAuth()" class="bg-blue-600 px-10 py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-600/20">Mulai Chat Sekarang</button>
        </div>
    </div>

    <div id="auth-page" class="hidden fixed inset-0 z-[130] bg-slate-950 flex items-center justify-center p-6">
        <div class="w-full max-w-md glass-card p-10 rounded-[2.5rem] text-center">
            <h2 class="text-3xl font-black mb-8">Login Ke Klyna</h2>
            <div class="space-y-4 text-left">
                <input id="username" type="text" placeholder="Username" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none focus:border-blue-500">
                <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none focus:border-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold hover:bg-blue-500 transition-all active:scale-95">Sign In</button>
                <button onclick="location.reload()" class="w-full text-slate-500 text-[10px] font-bold mt-4">KEMBALI KE BERANDA</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden flex h-screen overflow-hidden">
        <div class="flex-1 flex flex-col bg-[#020617] border-r border-white/5">
            <header class="h-16 flex justify-between items-center px-6 border-b border-white/5 glass-card">
                <div class="flex items-center gap-3">
                    <span id="badge" class="text-[10px] font-bold tracking-widest px-3 py-1 rounded-full bg-slate-800 text-slate-400">LOADING...</span>
                </div>
                <button onclick="logout()" class="text-xs text-slate-500 font-bold">LOGOUT</button>
            </header>
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6">
                <div id="chat-inner" class="max-w-3xl mx-auto space-y-6 pt-10"></div>
            </div>
            <div class="p-6">
                <div class="max-w-3xl mx-auto glass-card rounded-3xl p-2 flex items-center gap-2 shadow-2xl">
                    <input id="chat-input" type="text" placeholder="Tanya sesuatu..." class="flex-1 bg-transparent p-4 outline-none text-sm ml-2 text-white" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="p-4 bg-blue-600 rounded-2xl hover:bg-blue-500 transition-all text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
                <p id="upgrade-btn" class="text-center text-[10px] mt-4 text-blue-500/50 hover:text-blue-400 cursor-pointer font-bold" onclick="buyPremium()">✨ UPGRADE PREMIUM LIFETIME RP500 ✨</p>
            </div>
        </div>

        <div id="canvas-area" class="hidden lg:flex flex-col w-[550px] bg-slate-900 border-l border-white/10 canvas-slide translate-x-full">
            <div class="h-16 bg-slate-900 flex justify-between items-center px-4 border-b border-white/5">
                <div class="flex bg-slate-800 p-1 rounded-xl">
                    <button onclick="switchTab('preview')" id="btn-preview" class="px-4 py-1.5 rounded-lg text-[10px] font-bold bg-blue-600 text-white">PREVIEW</button>
                    <button onclick="switchTab('code')" id="btn-code" class="px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-400">KODE</button>
                </div>
                <div class="flex items-center gap-3">
                    <button id="copy-btn" onclick="copyCanvasCode()" class="hidden text-[10px] font-bold text-blue-400 bg-blue-400/10 px-3 py-1.5 rounded-lg border border-blue-400/20">SALIN KODE</button>
                    <button onclick="closeCanvas()" class="text-red-400 text-xs font-bold">TUTUP</button>
                </div>
            </div>
            <iframe id="preview-frame" class="flex-1 w-full bg-white"></iframe>
            <textarea id="code-view" readonly class="hidden flex-1 w-full bg-[#020617] text-blue-300 p-6 text-xs font-mono outline-none"></textarea>
        </div>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-slate-950/90 hidden items-center justify-center p-6 z-[140] backdrop-blur-xl">
        <div class="bg-white p-10 rounded-[3rem] text-center w-full max-w-xs shadow-2xl text-slate-900">
            <h3 class="text-xl font-black mb-1">Go Premium</h3>
            <img id="qris-img" class="w-full my-6 border rounded-3xl" src="">
            <p class="text-blue-600 font-bold text-[10px] animate-pulse uppercase tracking-widest">Menunggu Pembayaran...</p>
            <button onclick="location.reload()" class="mt-8 text-xs font-bold text-slate-400 uppercase">Batal</button>
        </div>
    </div>

    <script>
        let checkPayInterval;
        let currentCode = "";

        window.onload = () => { if(localStorage.getItem('klyna_user')) showApp(); };

        function goToAuth() { document.getElementById('landing-section').classList.add('hidden'); document.getElementById('auth-page').classList.remove('hidden'); }
        function showApp() { 
            document.getElementById('landing-section').classList.add('hidden'); 
            document.getElementById('auth-page').classList.add('hidden'); 
            document.getElementById('app-container').classList.remove('hidden');
            updateUIStatus();
        }

        function updateUIStatus() {
            const isPrem = localStorage.getItem('is_premium') === 'true';
            const b = document.getElementById('badge');
            b.innerText = isPrem ? "👑 PREMIUM" : "⚡ FREE TIER";
            b.className = isPrem ? "text-[10px] font-bold tracking-widest px-3 py-1 rounded-full bg-blue-600 text-white" : "text-[10px] font-bold tracking-widest px-3 py-1 rounded-full bg-slate-800 text-slate-400";
            if(isPrem) document.getElementById('upgrade-btn').classList.add('hidden');
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: user, password: pass}) });
            const data = await res.json();
            if(data.success) { localStorage.setItem('klyna_user', user); localStorage.setItem('is_premium', data.user.isPremium); showApp(); }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value;
            if(!text) return;
            appendMsg('User', text);
            input.value = '';
            const tid = appendTyping();
            const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: localStorage.getItem('klyna_user'), text}) });
            const data = await res.json();
            removeTyping(tid);
            if(data.isPremium !== undefined) { localStorage.setItem('is_premium', data.isPremium); updateUIStatus(); }
            appendMsg('AI', data.result);
        }

        function appendMsg(sender, text) {
            const inner = document.getElementById('chat-inner');
            const isUser = sender === 'User';
            const hasHtml = text.includes('<html') || text.includes('<!DOCTYPE') || text.includes('<div');
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            div.innerHTML = `
                <div class="${isUser ? 'user-bubble text-white shadow-lg' : 'ai-bubble text-slate-200'} p-4 px-6 text-[14px] leading-relaxed max-w-[85%]">
                    <div>${text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-blue-400 underline font-bold">$1</a>')}</div>
                    ${!isUser && hasHtml ? `<button onclick="openCanvas(\`${text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="mt-4 bg-blue-500 text-[10px] font-bold py-2 px-4 rounded-xl shadow-lg">LIHAT DI KANVAS</button>` : ''}
                </div>`;
            inner.appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function openCanvas(code) {
            currentCode = code;
            document.getElementById('canvas-area').classList.remove('hidden');
            setTimeout(() => document.getElementById('canvas-area').classList.remove('translate-x-full'), 10);
            document.getElementById('code-view').value = code;
            switchTab('preview');
            const frame = document.getElementById('preview-frame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        }

        function switchTab(t) {
            const isPrev = t === 'preview';
            document.getElementById('preview-frame').classList.toggle('hidden', !isPrev);
            document.getElementById('code-view').classList.toggle('hidden', isPrev);
            document.getElementById('copy-btn').classList.toggle('hidden', isPrev);
            document.getElementById('btn-preview').className = isPrev ? "px-4 py-1.5 rounded-lg text-[10px] font-bold bg-blue-600 text-white" : "px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-400";
            document.getElementById('btn-code').className = !isPrev ? "px-4 py-1.5 rounded-lg text-[10px] font-bold bg-blue-600 text-white" : "px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-400";
        }

        function copyCanvasCode() {
            navigator.clipboard.writeText(currentCode);
            const b = document.getElementById('copy-btn'); b.innerText = "TERSALIN!";
            setTimeout(() => b.innerText = "SALIN KODE", 2000);
        }

        async function buyPremium() {
            const res = await fetch('/api/pay-create');
            const data = await res.json();
            document.getElementById('qris-img').src = `https://api.qrserver.com/v1/create-qr-code/?data=${data.qr}`;
            document.getElementById('pay-modal').classList.replace('hidden', 'flex');
            checkPayInterval = setInterval(async () => {
                const c = await fetch('/api/pay-check', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: localStorage.getItem('klyna_user'), trxId: data.trxId}) });
                const r = await c.json();
                if(r.success) { clearInterval(checkPayInterval); localStorage.setItem('is_premium', 'true'); updateUIStatus(); document.getElementById('pay-modal').classList.add('hidden'); alert("👑 Premium Aktif!"); }
            }, 5000);
        }

        function appendTyping() {
            const id = 't-' + Date.now();
            document.getElementById('chat-inner').innerHTML += `<div id="${id}" class="flex justify-start"><div class="ai-bubble p-4 px-6 flex gap-1.5"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay: 0.2s"></div><div class="typing-dot" style="animation-delay: 0.4s"></div></div></div>`;
            return id;
        }
        function removeTyping(id) { document.getElementById(id)?.remove(); }
        function closeCanvas() { document.getElementById('canvas-area').classList.add('translate-x-full'); setTimeout(() => document.getElementById('canvas-area').classList.add('hidden'), 400); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
