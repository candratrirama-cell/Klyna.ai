<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klyna AI - Pro Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .user-bubble { background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 20px 20px 4px 20px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .ai-bubble { background: #1e293b; border-radius: 4px 20px 20px 20px; border: 1px solid rgba(255,255,255,0.05); }
        .typing-dot { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        .canvas-slide { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .premium-glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #3b82f6; } to { box-shadow: 0 0 20px #3b82f6; } }
    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden flex flex-col">

    <div id="auth-page" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="w-full max-w-md glass-card p-10 rounded-[2.5rem] text-center">
            <h1 class="text-5xl font-extrabold text-white mb-2 tracking-tighter">KLYNA<span class="text-blue-500">.</span></h1>
            <p class="text-slate-500 text-sm mb-10">Smart AI for Future Builders</p>
            <div class="space-y-4 text-left">
                <input id="username" type="text" placeholder="Username" class="w-full p-4 bg-slate-900/50 rounded-2xl border border-slate-800 focus:border-blue-500 outline-none transition-all">
                <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-slate-900/50 rounded-2xl border border-slate-800 focus:border-blue-500 outline-none transition-all">
                <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold hover:bg-blue-500 transition-all transform active:scale-95 shadow-xl shadow-blue-900/20">Sign In</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden flex flex-1 overflow-hidden">
        
        <div class="flex-1 flex flex-col min-w-0 bg-[#020617]">
            <header class="h-16 flex justify-between items-center px-6 border-b border-white/5 glass-card">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">K</div>
                    <span id="badge" class="text-[11px] font-bold tracking-widest px-3 py-1 rounded-full">LOADING...</span>
                </div>
                <button onclick="logout()" class="text-slate-500 hover:text-white text-xs font-medium">LOGOUT</button>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8">
                <div class="max-w-2xl mx-auto text-center py-10" id="welcome-hint">
                    <h2 class="text-3xl font-bold text-white mb-2">Apa yang bisa saya bantu?</h2>
                    <p class="text-slate-500 text-sm">Tanyakan apapun atau kirim kode HTML untuk pratinjau langsung.</p>
                </div>
                <div id="chat-inner" class="max-w-3xl mx-auto space-y-6"></div>
            </div>

            <div class="p-6">
                <div class="max-w-3xl mx-auto glass-card rounded-3xl p-2 flex items-center gap-2 shadow-2xl">
                    <input id="chat-input" type="text" placeholder="Tulis pesan..." class="flex-1 bg-transparent p-4 outline-none text-sm ml-2" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="p-4 bg-blue-600 rounded-2xl hover:bg-blue-500 transition-all active:scale-90 shadow-lg shadow-blue-600/30">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
                <p id="upgrade-btn" class="text-center text-[10px] mt-4 text-blue-500/50 hover:text-blue-400 cursor-pointer font-bold uppercase tracking-widest transition-all" onclick="buyPremium()">✨ Get Premium Lifetime Rp500 ✨</p>
            </div>
        </div>

        <div id="canvas-area" class="hidden lg:flex flex-col w-[500px] bg-white border-l border-white/10 canvas-slide translate-x-full">
            <div class="h-16 bg-slate-900 flex justify-between items-center px-6">
                <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase">Live Artifact</span>
                <button onclick="closeCanvas()" class="text-red-400 text-xs font-bold">CLOSE</button>
            </div>
            <iframe id="preview-frame" class="flex-1 w-full bg-white"></iframe>
        </div>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-slate-950/90 hidden items-center justify-center p-6 z-[110] backdrop-blur-xl">
        <div class="bg-white p-10 rounded-[3rem] text-center w-full max-w-xs shadow-2xl text-slate-900">
            <h3 class="text-xl font-black mb-1">Go Premium</h3>
            <p class="text-slate-400 text-xs mb-8">Scan QRIS untuk akses selamanya</p>
            <div class="bg-slate-50 p-4 rounded-3xl mb-6 border border-slate-100">
                <img id="qris-img" class="w-full" src="">
            </div>
            <div class="flex justify-center gap-1.5 mb-4">
                <div class="typing-dot"></div>
                <div class="typing-dot" style="animation-delay: 0.2s"></div>
                <div class="typing-dot" style="animation-delay: 0.4s"></div>
            </div>
            <p class="text-blue-600 font-bold text-[10px] tracking-tighter">WAITING FOR PAYMENT...</p>
            <button onclick="closeModal()" class="mt-8 text-xs font-bold text-slate-400 hover:text-red-500 transition-colors uppercase">Cancel</button>
        </div>
    </div>

    <script>
        let checkPayInterval;

        // Inisialisasi awal
        window.onload = () => {
            const user = localStorage.getItem('klyna_user');
            if(user) {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updateUIStatus();
            }
        };

        // Update UI berdasarkan status Premium
        function updateUIStatus() {
            const isPrem = localStorage.getItem('is_premium') === 'true';
            const badge = document.getElementById('badge');
            const upgradeBtn = document.getElementById('upgrade-btn');
            
            if(isPrem) {
                badge.innerText = "👑 PREMIUM";
                badge.className = "text-[10px] font-bold tracking-widest px-3 py-1 rounded-full bg-blue-600 text-white shadow-lg shadow-blue-600/40";
                upgradeBtn.classList.add('hidden');
            } else {
                badge.innerText = "⚡ FREE TIER";
                badge.className = "text-[10px] font-bold tracking-widest px-3 py-1 rounded-full bg-slate-800 text-slate-400 border border-white/5";
                upgradeBtn.classList.remove('hidden');
            }
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("Masukan data!");

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('klyna_user', user);
                localStorage.setItem('is_premium', data.user.isPremium);
                location.reload();
            } else alert(data.msg);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value;
            if(!text) return;
            
            document.getElementById('welcome-hint').classList.add('hidden');
            appendMsg('User', text);
            input.value = '';

            const tid = appendTyping();
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: localStorage.getItem('klyna_user'), text: text})
            });
            const data = await res.json();
            removeTyping(tid);

            // Jika backend kirim status premium terbaru, update lokal
            if(data.isPremium !== undefined) {
                localStorage.setItem('is_premium', data.isPremium);
                updateUIStatus();
            }

            // Detect HTML
            if(data.result.includes('<html') || data.result.includes('<!DOCTYPE') || data.result.includes('<div')) {
                showCanvas(data.result);
            }

            appendMsg('AI', data.result);
        }

        function appendMsg(sender, text) {
            const inner = document.getElementById('chat-inner');
            const isUser = sender === 'User';
            const html = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2">
                    <div class="${isUser ? 'user-bubble text-white' : 'ai-bubble text-slate-200'} p-4 md:p-6 text-[14px] leading-relaxed max-w-[85%]">
                        ${formatContent(text)}
                    </div>
                </div>`;
            inner.innerHTML += html;
            scrollToBottom();
        }

        function formatContent(text) {
            // Detect Links
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="text-blue-400 underline font-bold">${url}</a>`);
        }

        function appendTyping() {
            const id = 't-' + Date.now();
            const inner = document.getElementById('chat-inner');
            inner.innerHTML += `
                <div id="${id}" class="flex justify-start">
                    <div class="ai-bubble p-4 px-6 flex gap-1.5">
                        <div class="typing-dot"></div>
                        <div class="typing-dot" style="animation-delay: 0.2s"></div>
                        <div class="typing-dot" style="animation-delay: 0.4s"></div>
                    </div>
                </div>`;
            scrollToBottom();
            return id;
        }

        function removeTyping(id) { document.getElementById(id)?.remove(); }

        function showCanvas(code) {
            const area = document.getElementById('canvas-area');
            area.classList.remove('hidden');
            setTimeout(() => area.classList.remove('translate-x-full'), 10);
            const frame = document.getElementById('preview-frame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        }

        function closeCanvas() {
            const area = document.getElementById('canvas-area');
            area.classList.add('translate-x-full');
            setTimeout(() => area.classList.add('hidden'), 400);
        }

        async function buyPremium() {
            const res = await fetch('/api/pay-create');
            const data = await res.json();
            document.getElementById('qris-img').src = `https://api.qrserver.com/v1/create-qr-code/?data=${data.qr}`;
            document.getElementById('pay-modal').classList.replace('hidden', 'flex');
            
            checkPayInterval = setInterval(async () => {
                const c = await fetch('/api/pay-check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: localStorage.getItem('klyna_user'), trxId: data.trxId})
                });
                const r = await c.json();
                if(r.success) {
                    clearInterval(checkPayInterval);
                    localStorage.setItem('is_premium', 'true');
                    updateUIStatus(); // <-- Langsung update status di layar
                    closeModal();
                    alert("👑 SELAMAT! Anda sekarang Premium Seumur Hidup.");
                }
            }, 5000);
        }

        function closeModal() {
            clearInterval(checkPayInterval);
            document.getElementById('pay-modal').classList.replace('flex', 'hidden');
        }

        function scrollToBottom() {
            const box = document.getElementById('chat-box');
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
